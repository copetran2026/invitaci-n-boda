        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        const Pause = createIcon('<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>');

        // --- ELEMENTOS DE VIDA: Acuarelas, Line Art y Fondos Atmosféricos ---

        const BotanicalLineArt = ({ style, rotation = 0 }) => (

          const [scrolled, setScrolled] = useState(false);
          const [submitted, setSubmitted] = useState(false);
          const [loading, setLoading] = useState(false);
          const [isPlaying, setIsPlaying] = useState(false);
          const audioRef = useRef(null);
          const [formData, setFormData] = useState({ nombre: '', asistencia: 'si', acompanante: 'no', alergias: '' });

          const GOOGLE_FORM_URL = "https://docs.google.com/forms/u/0/d/e/TU_ID_DE_FORMULARIO/formResponse";
          const ENTRY_IDS = { nombre: "entry.1", asistencia: "entry.2", acompanante: "entry.3", alergias: "entry.4" };

          useEffect(() => {
            const handleScroll = () => setScrolled(window.scrollY > 50);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          useEffect(() => {
            if (audioRef.current) {
              if (isPlaying) {
                audioRef.current.play().catch(e => console.log("Reproducción bloqueada por el navegador"));
              } else {
                audioRef.current.pause();
              }
            }
          }, [isPlaying]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            const googleFormData = new FormData();
            googleFormData.append(ENTRY_IDS.nombre, formData.nombre);
            googleFormData.append(ENTRY_IDS.asistencia, formData.asistencia);
            googleFormData.append(ENTRY_IDS.acompanante, formData.acompanante);
            googleFormData.append(ENTRY_IDS.alergias, formData.alergias);
            try {
              await fetch(GOOGLE_FORM_URL, { method: 'POST', mode: 'no-cors', body: googleFormData });
              setSubmitted(true);
            } catch (error) { console.error(error); } finally { setLoading(false); }
          };

          const openGmaps = () => { window.open('https://www.google.com/maps/search/?api=1&query=Hacienda+Retiro+Real+Villa+de+Leyva', '_blank'); };

          const itinerary = [

            { time: "06:00 PM", title: "Sunset Cóctel", desc: "Brindis y conversación mientras el sol se oculta tras la cordillera.", phrase: "Donde el sol se despide, la magia despierta.", icon: <Sun className="w-5 h-5" /> },
            { time: "07:30 PM", title: "Celebración", desc: "Baile y alegría bajo el cielo estrellado.", phrase: "Porque la vida es hoy y el mañana es nuestro.", icon: <Music className="w-5 h-5" /> }
          ];

                <BotanicalLineArt style={{ top: '2%', left: '5%', width: '200px', height: '200px' }} rotation={-15} />
                
                <div className="relative z-10 max-w-4xl mx-auto px-6 text-center mb-20">
                  <span className="text-[#5C768D] font-sans text-[11px] uppercase tracking-[0.4em] font-bold">Cronograma</span>
                  <h2 className="text-4xl md:text-5xl mt-4 font-light italic text-[#2C3E50]">El Viaje del Día</h2>
                </div>
                <div className="relative z-10 max-w-4xl mx-auto px-6">
                  <div className="absolute left-4 md:left-1/2 top-0 bottom-0 w-[1px] bg-[#5C768D]/30 -translate-x-1/2"></div>
                  <div className="space-y-24">
                    {itinerary.map((item, index) => (
                      <div key={index} className={`relative flex items-center ${index % 2 === 0 ? 'md:flex-row-reverse' : ''}`}>
                        <div className="absolute left-4 md:left-1/2 w-12 h-12 bg-[#FFFDF2] border-2 border-[#5C768D] rounded-full -translate-x-1/2 z-10 flex items-center justify-center text-[#5C768D] shadow-md">{item.icon}</div>
                        <div className="ml-16 md:ml-0 md:w-1/2 md:px-16">
                          <div className="p-10 rounded-[2.5rem] bg-white/80 backdrop-blur-sm border border-white/60 shadow-sm hover:shadow-lg transition-all duration-300">
                            <span className="text-[#5C768D] font-sans text-[10px] font-bold tracking-widest">{item.time}</span>
                            <h4 className="text-2xl mt-4 mb-2 font-light text-[#2C3E50]">{item.title}</h4>
                            <p className="text-[#7F8C8D] font-sans text-sm mb-4">{item.desc}</p>
                            <div className="pt-4 border-t border-gray-50 italic text-[#5C768D] text-xs opacity-80 tracking-tighter">"{item.phrase}"</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              <section id="vestimenta" className="relative py-32 px-6 w-full bg-[#FCEFEF]">
                <div className="absolute inset-0 bg-gradient-to-t from-[#FCEFEF] to-transparent h-32 z-0 pointer-events-none top-0"></div>
                <BotanicalLineArt style={{ top: '5%', left: '40%', width: '250px', height: '250px' }} rotation={90} />

                <div className="relative z-10 max-w-6xl mx-auto grid md:grid-cols-2 gap-20 items-center">
                  <div className="relative group">
                    <div className="absolute -inset-6 bg-white/50 rounded-[4rem] -rotate-3 transition-transform group-hover:rotate-0"></div>
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&q=80&w=2069" alt="Estética" className="relative rounded-[3.5rem] shadow-2xl grayscale-[15%] contrast-[95%]" />
                  </div>
                  <div className="space-y-12">
                    <div>
                      <span className="text-[#5C768D] font-sans text-[11px] uppercase tracking-[0.4em] font-bold">Etiqueta</span>
                      <h2 className="text-4xl md:text-5xl mt-6 mb-8 font-light italic text-[#2C3E50]">Business Casual</h2>
                      <div className="space-y-10">
                        <div className="flex gap-8"><Shirt className="text-[#5C768D] w-7 h-7 shrink-0" /><p className="text-base text-[#7F8C8D]"><strong className="text-[#2C3E50]">Hombres:</strong> Pantalón de tela/dril, camisa y blazer (sin corbata).<br /><br /><strong className="text-[#2C3E50]">Mujeres:</strong> Vestidos fluidos o faldas elegantes.</p></div>
                        <div className="flex gap-8"><Info className="text-[#5C768D] w-7 h-7 shrink-0" /><p className="text-base text-[#7F8C8D]">Estaremos en la naturaleza: usar calzado cómodo para el césped y traer abrigo para la noche.</p></div>
                      </div>
                    </div>
                    <div className="pt-4 border-t border-[#5C768D]/20">
                       <p className="font-sans text-[10px] uppercase tracking-[0.3em] text-[#5C768D] mb-6 font-bold">Gama Acuarela Viva</p>
                       <div className="flex gap-5">
                         {['#FFFDF2', '#FCEFEF', '#F0F5F9', '#5C768D', '#2C3E50'].map(c => <div key={c} style={{backgroundColor: c}} className="w-10 h-10 rounded-full border-4 border-white shadow-md transform hover:scale-110 transition-all"></div>)}
                       </div>
                    </div>
                  </div>
                </div>
              </section>

              <section className="relative py-32 px-6 text-center w-full bg-[#F0F5F9]">
                <WatercolorWash color="bg-rose-200" style={{ top: '-20%', right: '20%', width: '600px', height: '600px' }} />
                <GoldFlourish style={{ bottom: '5%', left: '10%', width: '180px', height: '180px' }} />

                <div className="relative z-10 max-w-4xl mx-auto">
                  <Gift className="text-[#5C768D] w-12 h-12 mx-auto mb-8 opacity-80" />
                  <h2 className="text-4xl font-light italic mb-10 text-[#2C3E50]">Un detalle con amor</h2>
                  <div className="bg-white/70 backdrop-blur-sm p-8 md:p-16 rounded-[4rem] border border-white/60 group shadow-sm">
                    <p className="text-[#7F8C8D] font-sans text-lg mb-12 max-w-xl mx-auto italic">
                      Nuestra alegría es su compañía. Si desean hacernos un presente, contaremos con <span className="text-[#2C3E50] font-bold uppercase text-sm tracking-widest">Lluvia de sobres</span>.
                    </p>
                    
                    <div className="relative h-[450px] rounded-[2.5rem] overflow-hidden shadow-2xl">
                       <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10"></div>
                       <img 
                         src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?auto=format&fit=crop&q=80&w=1000" 
                         alt="Pareja caminando al atardecer" 
                         className="w-full h-full object-cover transform transition-transform duration-[4000ms] group-hover:scale-110" 
                       />
                       <div className="absolute inset-0 z-20 flex flex-col items-center justify-end p-12">
                          <p className="text-white text-2xl md:text-3xl font-light italic text-center leading-relaxed mb-6">
                            "Su compañía será parte del inicio de nuestro hogar y nuestros sueños compartidos."
                          </p>
                          <Sparkles className="text-[#EAB308] w-6 h-6 opacity-80" />
                       </div>
                    </div>
                  </div>
                </div>
              </section>

              <section id="rsvp" className="relative py-32 px-6 w-full bg-[#FFFDF2]">
                <AtmosphericLandscape src="https://images.unsplash.com/photo-1494548162494-384bba4ab999?auto=format&fit=crop&q=80&w=2000" opacity="opacity-[0.18]" blend="mix-blend-multiply" bgColor="from-[#FFFDF2] to-[#FFFDF2]" />
                <BotanicalLineArt style={{ bottom: '0%', right: '-5%', width: '350px', height: '350px' }} rotation={-90} />

                <div className="relative z-10 max-w-4xl mx-auto">
                  <div className="text-center mb-20">
                    <span className="text-[#5C768D] font-sans text-[11px] uppercase tracking-[0.4em] font-bold">Confirmación</span>
                    <h2 className="text-4xl md:text-6xl mt-4 font-light italic text-[#2C3E50]">¿Nos acompañan?</h2>
                    <p className="text-[#7F8C8D] mt-6 italic">Por favor, confirmen antes del 15 de Julio.</p>
                  </div>

                  {submitted ? (
                    <div className="bg-white/80 p-16 rounded-[3rem] text-center border border-[#5C768D]/20 animate-fade-in shadow-inner backdrop-blur-sm">
                      <CheckCircle className="text-[#5C768D] w-16 h-16 mx-auto mb-8" />
                      <h3 className="text-3xl mb-4 font-light italic font-serif text-[#2C3E50]">¡Gracias, {formData.nombre}!</h3>
                      <p className="text-[#7F8C8D] font-sans max-w-sm mx-auto">Tu mensaje ha sido recibido con cariño. Nos vemos muy pronto en Villa de Leyva.</p>
                      <button onClick={() => setSubmitted(false)} className="mt-12 text-[11px] uppercase tracking-widest font-sans font-bold text-[#5C768D] hover:underline">Enviar otra respuesta</button>
                    </div>
                  ) : (
                    <form onSubmit={handleSubmit} className="bg-white/70 backdrop-blur-md p-12 md:p-16 rounded-[3.5rem] border border-white/60 shadow-sm space-y-10">
                      <div className="grid md:grid-cols-2 gap-10">
                        <div className="space-y-4 text-left">
                          <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D]">Nombre Completo</label>
                          <input required type="text" name="nombre" value={formData.nombre} onChange={handleInputChange} placeholder="Tu nombre" className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-2xl px-6 py-5 outline-none font-sans text-[#2C3E50] transition-colors" />
                        </div>
                        <div className="space-y-4 text-left">
                          <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D]">¿Asistirás?</label>
                          <select name="asistencia" value={formData.asistencia} onChange={handleInputChange} className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-2xl px-6 py-5 outline-none font-sans text-[#2C3E50] cursor-pointer transition-colors">
                            <option value="si">Confirmar Asistencia</option>
                            <option value="no">Lamentablemente no podré</option>
                          </select>
                        </div>
                      </div>

                      {formData.asistencia === 'si' && (
                        <div className="space-y-4 animate-fade-in text-left">
                          <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D] flex items-center gap-2"><Users className="w-4 h-4" /> ¿Vienes con acompañante?</label>
                          <div className="flex gap-4">
                            <button type="button" onClick={() => setFormData({...formData, acompanante: 'si'})} className={`flex-1 py-4 rounded-2xl font-sans text-xs uppercase tracking-widest transition-all ${formData.acompanante === 'si' ? 'bg-[#5C768D] text-white shadow-md' : 'bg-white/90 text-[#7F8C8D]'}`}>Sí</button>
                            <button type="button" onClick={() => setFormData({...formData, acompanante: 'no'})} className={`flex-1 py-4 rounded-2xl font-sans text-xs uppercase tracking-widest transition-all ${formData.acompanante === 'no' ? 'bg-[#5C768D] text-white shadow-md' : 'bg-white/90 text-[#7F8C8D]'}`}>No</button>
                          </div>
                        </div>
                      )}

                      <div className="space-y-4 text-left">
                        <label className="text-[11px] uppercase tracking-[0.2em] font-sans font-bold text-[#5C768D] flex items-center gap-2"><AlertCircle className="w-4 h-4" /> Notas o Alergias</label>
                        <textarea name="alergias" value={formData.alergias} onChange={handleInputChange} rows="3" placeholder="Mensaje para los novios..." className="w-full bg-white/90 border border-transparent focus:border-[#5C768D] rounded-3xl px-6 py-5 outline-none font-sans resize-none text-[#2C3E50] transition-colors"></textarea>
                      </div>

                      <button type="submit" disabled={loading} className="w-full bg-[#5C768D] text-white py-6 rounded-2xl text-xs uppercase tracking-[0.4em] font-sans font-bold hover:bg-[#4A6074] transition-all flex items-center justify-center gap-4 active:scale-95 disabled:opacity-50 shadow-xl shadow-blue-900/5">
                        <Send className="w-4 h-4" />
                        <span>{loading ? 'ENVIANDO...' : 'ENVIAR RESPUESTA'}</span>
                      </button>
                    </form>
                  )}
                </div>
              </section>

              <footer className="relative py-32 bg-white text-center border-t border-[#EAD3C6] overflow-hidden">
                <BotanicalLineArt style={{ bottom: '-10%', left: '40%', width: '200px', height: '200px' }} rotation={15} />
                <GoldenDust />
                <div className="relative z-10">
                  <h2 className="text-4xl font-light italic text-[#5C768D] mb-10 tracking-widest">Laura & Gabriel</h2>
                  <div className="w-16 h-[1px] bg-[#5C768D]/30 mx-auto mb-12"></div>
                  <p className="text-[11px] uppercase tracking-[0.5em] text-[#7F8C8D] mb-12 font-bold font-sans">VILLA DE LEYVA — 08.08.2026</p>
                  <Heart className="w-5 h-5 text-[#5C768D] mx-auto opacity-40" />
                </div>
              </footer>

              <div className="fixed bottom-6 right-6 z-50 animate-fade-in-up">
                <audio ref={audioRef} loop src="https://cdn.pixabay.com/audio/2022/11/22/audio_d3e18a9dbd.mp3" />
                <button 
                  onClick={() => setIsPlaying(!isPlaying)}
                  className="bg-white/90 backdrop-blur-md border border-[#F0F5F9] p-4 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 hover:bg-[#FFFDF2] transition-all group"
                  title={isPlaying ? "Pausar música" : "Escuchar nuestra canción"}
                >
                  {isPlaying ? (
                    <Pause className="w-6 h-6 text-[#5C768D] animate-pulse" />
                  ) : (
                    <div className="relative">
                      <Music className="w-6 h-6 text-[#5C768D] group-hover:animate-bounce" />
                      <span className="absolute -top-1 -right-1 flex h-3 w-3">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#5C768D] opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-[#5C768D]"></span>
                      </span>
                    </div>
                  )}
                </button>
              </div>

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
